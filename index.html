<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Field Journal" />
  <title>Field Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: #0d0d0f;
      --surface: #15151a;
      --surface2: #1c1c24;
      --surface3: #232330;
      --border: #2a2a38;
      --border2: #35354a;
      --accent: #c9a96e;
      --accent2: #e8c99a;
      --text: #e8e6f0;
      --text2: #9b99b0;
      --text3: #5e5c72;
      --red: #e05c6a;
      --green: #5ecb8c;
      --blue: #5e9de0;
      --shadow: rgba(0,0,0,0.5);
      --card-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    :root[data-theme="light"] {
      --bg: #f4f2ed;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --surface3: #e8e4db;
      --border: #ddd8cc;
      --border2: #ccc5b5;
      --accent: #a07830;
      --accent2: #c09048;
      --text: #1a1810;
      --text2: #5a5440;
      --text3: #9a9080;
      --red: #c0404e;
      --green: #2e9060;
      --blue: #2e68b0;
      --shadow: rgba(0,0,0,0.12);
      --card-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      transition: background 0.3s, color 0.3s;
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px 100px;
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* ── Header ── */
    .header {
      padding: 24px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo small {
      font-style: italic;
      font-weight: 400;
      color: var(--text3);
      font-size: 12px;
      display: block;
      font-family: 'DM Sans', sans-serif;
      margin-top: 2px;
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: var(--text2);
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-icon:active, .btn-icon.active { background: var(--surface2); border-color: var(--border2); color: var(--accent); }

    .btn-new {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-new:active { background: var(--accent2); transform: scale(0.97); }

    /* ── View Tabs ── */
    .view-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 18px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .tab-btn.active { background: var(--accent); color: #fff; }

    /* ── Stats Dashboard ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: 8px; }

    /* ── Empty ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px; gap: 10px; color: var(--text3); text-align: center;
    }
    .empty .icon { font-size: 52px; opacity: 0.35; }
    .empty h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text2); margin-top: 4px; }
    .empty p { font-size: 13px; line-height: 1.7; max-width: 260px; }
    .empty .btn-new { margin-top: 12px; }

    /* ── Day Card ── */
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--card-shadow);
    }
    .day-card.open { border-color: var(--border2); }
    .day-card.dragging { opacity: 0.4; transform: scale(0.98); }
    .day-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

    .day-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; cursor: pointer;
      user-select: none; -webkit-user-select: none;
      transition: background 0.15s;
    }
    .day-header:active { background: var(--surface2); }

    .drag-handle {
      color: var(--text3); font-size: 14px; cursor: grab;
      padding: 4px 2px; flex-shrink: 0; line-height: 1;
      touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .date-badge {
      background: var(--surface3); border: 1px solid var(--border2);
      border-radius: 10px; padding: 6px 9px; text-align: center; min-width: 46px; flex-shrink: 0;
    }
    .date-badge .d { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
    .date-badge .m { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-top: 2px; }

    .day-info { flex: 1; min-width: 0; }
    .day-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .weather-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 1px 6px; font-size: 10px; color: var(--text2);
      font-family: 'DM Mono', monospace; cursor: pointer;
    }
    .weather-badge:hover { border-color: var(--border2); }

    .day-del { background: none; border: none; color: var(--text3); font-size: 15px; cursor: pointer; padding: 6px; border-radius: 6px; transition: color 0.15s; line-height: 1; }
    .day-del:active { color: var(--red); }

    .chevron { color: var(--text3); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
    .day-card.open .chevron { transform: rotate(90deg); }

    /* ── Day Body ── */
    .day-body { border-top: 1px solid var(--border); padding: 12px 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Location ── */
    .loc-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: box-shadow 0.15s; }
    .loc-card.loc-dragging { opacity: 0.4; }
    .loc-card.loc-drag-over { border-color: var(--accent); }

    .loc-top { display: flex; align-items: flex-start; gap: 10px; padding: 11px 11px 9px; }

    .loc-drag {
      color: var(--text3); font-size: 12px; cursor: grab; padding: 2px; flex-shrink: 0;
      margin-top: 8px; touch-action: none;
    }

    .loc-emoji {
      width: 34px; height: 34px; background: var(--surface3); border: 1px solid var(--border2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; cursor: pointer;
    }

    .loc-fields { flex: 1; min-width: 0; }
    .loc-name { display: block; width: 100%; background: none; border: none; outline: none; font-size: 14px; font-weight: 600; color: var(--text); font-family: 'DM Sans', sans-serif; }
    .loc-name::placeholder { color: var(--text3); }
    .loc-addr { display: block; width: 100%; background: none; border: none; outline: none; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
    .loc-addr::placeholder { color: var(--text3); opacity: 0.55; }

    .loc-del { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 4px 6px; border-radius: 5px; transition: color 0.15s; line-height: 1; }
    .loc-del:active { color: var(--red); }

    /* ── Star Rating ── */
    .star-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 11px 10px;
    }
    .star-lbl { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
    .stars { display: flex; gap: 2px; }
    .star {
      font-size: 16px; cursor: pointer; color: var(--text3);
      transition: color 0.1s, transform 0.1s;
      line-height: 1;
    }
    .star:hover, .star.filled { color: #f5c842; }
    .star:hover { transform: scale(1.2); }

    /* ── Photos ── */
    .photo-strip {
      display: flex; gap: 8px; padding: 0 11px 11px;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .photo-strip::-webkit-scrollbar { display: none; }

    .photo-wrap { position: relative; flex-shrink: 0; }
    .photo-thumb { width: 78px; height: 78px; border-radius: 9px; object-fit: cover; border: 1px solid var(--border2); display: block; cursor: pointer; }
    .photo-rm { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.72); border: none; border-radius: 50%; color: #fff; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .photo-add {
      width: 78px; height: 78px; border-radius: 9px; border: 1.5px dashed var(--border2);
      background: var(--surface3); display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; color: var(--text3); font-size: 10px;
      font-family: 'DM Sans', sans-serif; flex-shrink: 0; cursor: pointer;
    }
    .photo-add:active { border-color: var(--accent); color: var(--accent); }
    .photo-add span.cam { font-size: 20px; }

    /* ── Notes ── */
    .loc-notes { margin: 0 11px 11px; background: var(--surface3); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; }
    .note-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
    .note-lbl { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); min-width: 38px; }
    .note-val { flex: 1; background: none; border: none; outline: none; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; }
    .note-val::placeholder { color: var(--text3); opacity: 0.65; }
    .note-hr { height: 1px; background: var(--border); margin: 6px 0; }
    .note-memo { width: 100%; background: none; border: none; outline: none; font-size: 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; resize: none; min-height: 56px; line-height: 1.65; }
    .note-memo::placeholder { color: var(--text3); opacity: 0.65; }

    /* ── Add location ── */
    .add-loc-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px; background: none; border: 1.5px dashed var(--border);
      border-radius: 10px; color: var(--text3); font-size: 13px;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
    }
    .add-loc-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── Calendar View ── */
    .calendar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--card-shadow); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); }
    .cal-nav { background: none; border: 1px solid var(--border); border-radius: 7px; width: 32px; height: 32px; cursor: pointer; color: var(--text2); font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); padding: 4px 0; }
    .cal-cell { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--text2); cursor: default; position: relative; transition: all 0.1s; }
    .cal-cell.has-entry { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); cursor: pointer; }
    .cal-cell.has-entry:hover { border-color: var(--accent); color: var(--accent); }
    .cal-cell.today { border: 1.5px solid var(--accent); }
    .cal-dot { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }
    .cal-cell.other-month { opacity: 0.3; }

    /* ── Weather Modal ── */
    .weather-modal-body { display: flex; flex-direction: column; gap: 12px; }
    .weather-conditions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .weather-opt {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px;
      padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.15s; font-size: 22px;
    }
    .weather-opt span { display: block; font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 4px; }
    .weather-opt.selected, .weather-opt:hover { border-color: var(--accent); background: var(--surface3); }
    .temp-row { display: flex; align-items: center; gap: 10px; }
    .temp-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; }
    .temp-input:focus { border-color: var(--accent); }
    .temp-unit { display: flex; gap: 4px; }
    .unit-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; padding: 8px 12px; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .unit-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn 0.15s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal {
      background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
      padding: 24px 20px; width: 100%; max-width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7); animation: slideUp 0.18s ease-out;
    }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 19px; margin-bottom: 18px; }

    .field { margin-bottom: 13px; }
    .field label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
    .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; }
    .field input:focus { border-color: var(--accent); }
    .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.55); }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 10px 16px; color: var(--text2); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .btn-cancel:active { background: var(--surface2); }
    .btn-add { background: var(--accent); border: none; border-radius: 8px; padding: 10px 20px; color: #fff; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .btn-add:active { background: var(--accent2); }

    /* ── Lightbox ── */
    .lightbox { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.93); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s; }
    .lightbox img { max-width: 96vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
    .lb-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); width: 38px; height: 38px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ── Emoji picker ── */
    .emoji-pick { position: fixed; z-index: 250; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 4px; width: 220px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); animation: fadeIn 0.1s; }
    .emoji-opt { width: 36px; height: 36px; border-radius: 8px; border: none; background: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
    .emoji-opt:hover { background: var(--surface3); }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-num { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">
      Field Journal
      <small>travel log</small>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn-new" onclick="openModal()">+ New Day</button>
    </div>
  </header>

  <!-- Stats Dashboard -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- View Tabs -->
  <div class="view-tabs">
    <button class="tab-btn active" id="tab-timeline" onclick="switchView('timeline')">📋 Timeline</button>
    <button class="tab-btn" id="tab-calendar" onclick="switchView('calendar')">📅 Calendar</button>
  </div>

  <div id="view-timeline">
    <div class="timeline" id="timeline"></div>
  </div>
  <div id="view-calendar" style="display:none">
    <div class="calendar-wrap" id="calendar-wrap"></div>
  </div>
</div>

<!-- New Day Modal -->
<div class="overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h2>New Day Entry</h2>
    <div class="field">
      <label>Date</label>
      <input type="date" id="inp-date" />
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="inp-title" placeholder="e.g. Tokyo Day 1, Arrival…" onkeydown="if(event.key==='Enter')addDay()" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModalDirect()">Cancel</button>
      <button class="btn-add" onclick="addDay()">Add Day</button>
    </div>
  </div>
</div>

<!-- Weather Modal -->
<div class="overlay" id="weather-modal" style="display:none" onclick="closeWeatherModal(event)">
  <div class="modal">
    <h2>Weather</h2>
    <div class="weather-modal-body">
      <div class="weather-conditions" id="weather-conditions"></div>
      <div class="temp-row">
        <input class="temp-input" id="temp-val" type="number" placeholder="Temperature" />
        <div class="temp-unit">
          <button class="unit-btn active" id="unit-c" onclick="setUnit('C')">°C</button>
          <button class="unit-btn" id="unit-f" onclick="setUnit('F')">°F</button>
        </div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeWeatherModalDirect()">Cancel</button>
      <button class="btn-add" onclick="saveWeather()">Save</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="Photo" onclick="event.stopPropagation()" />
  <button class="lb-close" onclick="closeLightbox()">✕</button>
</div>

<!-- Emoji picker -->
<div class="emoji-pick" id="emoji-pick" style="display:none"></div>

<script>
const EMOJIS = ["📍","🏛️","🍜","🍣","☕","🛍️","🌿","🎭","🏖️","🏔️","🚉","🏨","🎪","🌃","🍕","🏞️","🎡","🚢","✈️","🏟️","🎸","🏺","🧁","🍦","🌺"];
const WEATHER_OPTIONS = [
  { icon:"☀️", label:"Sunny" },
  { icon:"⛅", label:"Partly" },
  { icon:"☁️", label:"Cloudy" },
  { icon:"🌧️", label:"Rainy" },
  { icon:"⛈️", label:"Storm" },
  { icon:"❄️", label:"Snow" },
  { icon:"🌫️", label:"Foggy" },
  { icon:"🌬️", label:"Windy" },
  { icon:"🌈", label:"Rainbow" },
];
const STORAGE_KEY = "fj_days_v3";
const THEME_KEY = "fj_theme";

let days = [];
let emojiTarget = null;
let weatherTarget = null;
let weatherSelected = null;
let weatherUnit = "C";
let currentView = "timeline";
let calYear, calMonth;
let dragSrcDay = null;
let dragSrcLoc = null;

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(days)); } catch(e) {} }

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) days = JSON.parse(d); } catch(e) { days = []; }
  const theme = localStorage.getItem(THEME_KEY) || "dark";
  document.documentElement.setAttribute("data-theme", theme);
  updateThemeBtn(theme);
}

function genId() { return Math.random().toString(36).slice(2,9); }
function today() { return new Date().toISOString().slice(0,10); }

function fmtDate(str) {
  if (!str) return { d:"--", m:"---", year:"", full:"" };
  const [y,mo,dy] = str.split("-").map(Number);
  const dt = new Date(y, mo-1, dy);
  return {
    d: String(dy).padStart(2,"0"),
    m: dt.toLocaleString("en",{month:"short"}).toUpperCase(),
    year: y,
    full: dt.toLocaleString("en",{weekday:"long",month:"long",day:"numeric",year:"numeric"})
  };
}

// ── Theme ──
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem(THEME_KEY, next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  document.getElementById("theme-btn").textContent = theme === "dark" ? "☀️" : "🌙";
}

// ── View switching ──
function switchView(v) {
  currentView = v;
  document.getElementById("view-timeline").style.display = v === "timeline" ? "" : "none";
  document.getElementById("view-calendar").style.display = v === "calendar" ? "" : "none";
  document.getElementById("tab-timeline").classList.toggle("active", v === "timeline");
  document.getElementById("tab-calendar").classList.toggle("active", v === "calendar");
  if (v === "calendar") renderCalendar();
}

// ── Stats ──
function renderStats() {
  const totalDays = days.length;
  const totalPlaces = days.reduce((s,d)=>s+d.locations.length,0);
  const totalPhotos = days.reduce((s,d)=>s+d.locations.reduce((ss,l)=>ss+l.photos.length,0),0);
  const ratedLocs = days.flatMap(d=>d.locations).filter(l=>l.rating>0);
  const avgRating = ratedLocs.length ? (ratedLocs.reduce((s,l)=>s+l.rating,0)/ratedLocs.length).toFixed(1) : "—";
  document.getElementById("stats-bar").innerHTML = `
    <div class="stat-card"><div class="stat-num">${totalDays}</div><div class="stat-lbl">Days</div></div>
    <div class="stat-card"><div class="stat-num">${totalPlaces}</div><div class="stat-lbl">Places</div></div>
    <div class="stat-card"><div class="stat-num">${totalPhotos}</div><div class="stat-lbl">Photos</div></div>
    <div class="stat-card"><div class="stat-num">${avgRating}</div><div class="stat-lbl">Avg ★</div></div>
  `;
}

// ── Modal ──
function openModal() {
  document.getElementById("inp-date").value = today();
  document.getElementById("inp-title").value = "";
  document.getElementById("modal").style.display = "flex";
  setTimeout(()=>document.getElementById("inp-title").focus(), 100);
}
function closeModal(e) { if (e.target===document.getElementById("modal")) closeModalDirect(); }
function closeModalDirect() { document.getElementById("modal").style.display = "none"; }

function addDay() {
  const date = document.getElementById("inp-date").value;
  if (!date) return;
  const title = document.getElementById("inp-title").value.trim() || "Untitled Day";
  days.push({ id:genId(), date, title, open:true, locations:[], weather:null });
  days.sort((a,b)=>a.date.localeCompare(b.date));
  save(); render();
  closeModalDirect();
}

// ── Weather Modal ──
function openWeatherModal(dayId) {
  weatherTarget = dayId;
  const day = getDay(dayId);
  weatherSelected = day.weather?.condition || null;
  weatherUnit = day.weather?.unit || "C";
  document.getElementById("temp-val").value = day.weather?.temp || "";
  setUnit(weatherUnit);
  document.getElementById("weather-conditions").innerHTML = WEATHER_OPTIONS.map(w => `
    <div class="weather-opt ${weatherSelected===w.icon?"selected":""}" onclick="selectWeatherCond('${w.icon}',this)">
      ${w.icon}<span>${w.label}</span>
    </div>
  `).join("");
  document.getElementById("weather-modal").style.display = "flex";
}
function closeWeatherModal(e) { if(e.target===document.getElementById("weather-modal")) closeWeatherModalDirect(); }
function closeWeatherModalDirect() { document.getElementById("weather-modal").style.display="none"; weatherTarget=null; }

function selectWeatherCond(icon, el) {
  weatherSelected = icon;
  document.querySelectorAll(".weather-opt").forEach(e=>e.classList.remove("selected"));
  el.classList.add("selected");
}
function setUnit(u) {
  weatherUnit = u;
  document.getElementById("unit-c").classList.toggle("active", u==="C");
  document.getElementById("unit-f").classList.toggle("active", u==="F");
}
function saveWeather() {
  if (!weatherTarget) return;
  const day = getDay(weatherTarget);
  const temp = document.getElementById("temp-val").value;
  day.weather = weatherSelected || temp ? { condition: weatherSelected, temp, unit: weatherUnit } : null;
  save(); render();
  closeWeatherModalDirect();
}

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}
function closeLightbox() { document.getElementById("lightbox").style.display = "none"; }

// ── Emoji picker ──
function openEmojiPicker(dayId, locId, btn) {
  emojiTarget = {dayId, locId};
  const pick = document.getElementById("emoji-pick");
  pick.innerHTML = EMOJIS.map(e=>`<button class="emoji-opt" onclick="selectEmoji('${e}')">${e}</button>`).join("");
  const r = btn.getBoundingClientRect();
  const top = Math.min(r.bottom+6, window.innerHeight-260);
  const left = Math.min(r.left, window.innerWidth-228);
  pick.style.top = top+"px"; pick.style.left = left+"px"; pick.style.display = "flex";
}
function selectEmoji(e) {
  if (!emojiTarget) return;
  updateLoc(emojiTarget.dayId, emojiTarget.locId, "emoji", e);
  document.getElementById("emoji-pick").style.display="none";
  emojiTarget = null; render();
}
document.addEventListener("click", e => {
  const pick = document.getElementById("emoji-pick");
  if (!pick.contains(e.target) && !e.target.classList.contains("loc-emoji")) pick.style.display="none";
});

// ── Data helpers ──
function getDay(id) { return days.find(d=>d.id===id); }
function getLoc(dayId, locId) { return getDay(dayId)?.locations.find(l=>l.id===locId); }

function toggleDay(id) { const d=getDay(id); if(d){d.open=!d.open;save();render();} }
function deleteDay(id) { if(!confirm("Delete this day?"))return; days=days.filter(d=>d.id!==id); save();render(); }

function addLocation(dayId) {
  const d=getDay(dayId); if(!d)return;
  d.locations.push({id:genId(),name:"",address:"",emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],photos:[],price:"",memo:"",rating:0});
  save(); render();
  setTimeout(()=>{const inputs=document.querySelectorAll(`[data-day="${dayId}"] .loc-name`);if(inputs.length)inputs[inputs.length-1].focus();},50);
}
function deleteLocation(dayId, locId) { const d=getDay(dayId);if(!d)return;d.locations=d.locations.filter(l=>l.id!==locId);save();render(); }
function updateLoc(dayId, locId, field, val) { const l=getLoc(dayId,locId);if(l){l[field]=val;save();} }

function setRating(dayId, locId, rating) {
  const l = getLoc(dayId, locId);
  if (l) {
    l.rating = l.rating === rating ? 0 : rating;
    save(); render();
  }
}

function handlePhoto(dayId, locId, files) {
  Array.from(files).forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      const l=getLoc(dayId,locId);
      if(l){l.photos.push({id:genId(),src:e.target.result,name:file.name});save();render();}
    };
    r.readAsDataURL(file);
  });
}
function removePhoto(dayId, locId, photoId) { const l=getLoc(dayId,locId);if(l){l.photos=l.photos.filter(p=>p.id!==photoId);save();render();} }

// ── Drag & Drop — Days ──
function initDayDrag() {
  const cards = document.querySelectorAll(".day-card[data-day]");
  cards.forEach(card => {
    const handle = card.querySelector(".drag-handle");
    if (!handle) return;

    handle.addEventListener("mousedown", e => { e.stopPropagation(); card.draggable = true; });
    handle.addEventListener("mouseup", () => { card.draggable = false; });

    card.addEventListener("dragstart", e => {
      dragSrcDay = card.dataset.day;
      setTimeout(()=>card.classList.add("dragging"), 0);
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.draggable = false;
      card.classList.remove("dragging");
      document.querySelectorAll(".day-card").forEach(c=>c.classList.remove("drag-over"));
      dragSrcDay = null;
    });
    card.addEventListener("dragover", e => { e.preventDefault(); if(card.dataset.day!==dragSrcDay)card.classList.add("drag-over"); });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      if (!dragSrcDay || dragSrcDay===card.dataset.day) return;
      const fromIdx = days.findIndex(d=>d.id===dragSrcDay);
      const toIdx = days.findIndex(d=>d.id===card.dataset.day);
      if (fromIdx<0||toIdx<0) return;
      const [moved] = days.splice(fromIdx,1);
      days.splice(toIdx,0,moved);
      save(); render();
    });
  });
}

// ── Drag & Drop — Locations ──
function initLocDrag(dayId) {
  const container = document.querySelector(`[data-day="${dayId}"] .day-body`);
  if (!container) return;
  const locCards = container.querySelectorAll(".loc-card[data-loc]");

  locCards.forEach(card => {
    const handle = card.querySelector(".loc-drag");
    if (!handle) return;
    handle.addEventListener("mousedown", e => { e.stopPropagation(); card.draggable = true; });
    handle.addEventListener("mouseup", () => { card.draggable = false; });

    card.addEventListener("dragstart", e => {
      dragSrcLoc = {dayId, locId: card.dataset.loc};
      setTimeout(()=>card.classList.add("loc-dragging"),0);
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.draggable = false;
      card.classList.remove("loc-dragging");
      container.querySelectorAll(".loc-card").forEach(c=>c.classList.remove("loc-drag-over"));
      dragSrcLoc = null;
    });
    card.addEventListener("dragover", e => { e.preventDefault(); if(card.dataset.loc!==dragSrcLoc?.locId)card.classList.add("loc-drag-over"); });
    card.addEventListener("dragleave", () => card.classList.remove("loc-drag-over"));
    card.addEventListener("drop", e => {
      e.preventDefault();
      card.classList.remove("loc-drag-over");
      if (!dragSrcLoc || dragSrcLoc.dayId!==dayId || dragSrcLoc.locId===card.dataset.loc) return;
      const day = getDay(dayId);
      const fromIdx = day.locations.findIndex(l=>l.id===dragSrcLoc.locId);
      const toIdx = day.locations.findIndex(l=>l.id===card.dataset.loc);
      if (fromIdx<0||toIdx<0) return;
      const [moved] = day.locations.splice(fromIdx,1);
      day.locations.splice(toIdx,0,moved);
      save(); render();
    });
  });
}

// ── Calendar ──
function renderCalendar() {
  const now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  const todayStr = today();
  const entryDates = new Set(days.map(d=>d.date));

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();

  const monthName = firstDay.toLocaleString("en",{month:"long",year:"numeric"});
  const dows = ["Su","Mo","Tu","We","Th","Fr","Sa"];

  let cells = "";
  dows.forEach(d => cells += `<div class="cal-dow">${d}</div>`);

  // Prev month fill
  for (let i=0;i<startDow;i++) {
    const d = new Date(calYear, calMonth, -startDow+i+1);
    cells += `<div class="cal-cell other-month">${d.getDate()}</div>`;
  }

  for (let d=1;d<=daysInMonth;d++) {
    const str = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const hasEntry = entryDates.has(str);
    const isToday = str===todayStr;
    const cls = [hasEntry?"has-entry":"",isToday?"today":""].filter(Boolean).join(" ");
    const dot = hasEntry ? `<div class="cal-dot"></div>` : "";
    const click = hasEntry ? `onclick="calDayClick('${str}')"` : "";
    cells += `<div class="cal-cell ${cls}" ${click}>${d}${dot}</div>`;
  }

  // Next month fill
  const remaining = 7 - ((startDow+daysInMonth)%7||7);
  if (remaining<7) for(let i=1;i<=remaining;i++) cells+=`<div class="cal-cell other-month">${i}</div>`;

  document.getElementById("calendar-wrap").innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">◀</button>
      <div class="cal-title">${monthName}</div>
      <button class="cal-nav" onclick="calNav(1)">▶</button>
    </div>
    <div class="cal-grid">${cells}</div>
  `;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth<0){calMonth=11;calYear--;}
  if (calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function calDayClick(dateStr) {
  const day = days.find(d=>d.date===dateStr);
  if (!day) return;
  switchView("timeline");
  setTimeout(()=>{
    const el = document.querySelector(`[data-day="${day.id}"]`);
    if (el) { el.scrollIntoView({behavior:"smooth",block:"start"}); if(!day.open){day.open=true;save();render();} }
  }, 100);
}

// ── Render ──
function render() {
  renderStats();
  const tl = document.getElementById("timeline");
  if (!tl) return;

  if (days.length===0) {
    tl.innerHTML = `
      <div class="empty">
        <div class="icon">🗺️</div>
        <h2>Your journal is empty</h2>
        <p>Tap "+ New Day" to start logging your locations, photos, and notes.</p>
        <button class="btn-new" onclick="openModal()">+ Add First Day</button>
      </div>`;
    return;
  }

  tl.innerHTML = days.map(day => {
    const fmt = fmtDate(day.date);
    const locCount = day.locations.length;
    const photoCount = day.locations.reduce((s,l)=>s+l.photos.length,0);
    const w = day.weather;
    const weatherHtml = w
      ? `<span class="weather-badge" onclick="event.stopPropagation();openWeatherModal('${day.id}')">${w.condition||"🌡️"} ${w.temp?w.temp+"°"+w.unit:""}</span>`
      : `<span class="weather-badge" onclick="event.stopPropagation();openWeatherModal('${day.id}')">+ weather</span>`;

    const locsHtml = day.open ? day.locations.map(loc => {
      const stars = [1,2,3,4,5].map(n=>`<span class="star ${loc.rating>=n?"filled":""}" onclick="setRating('${day.id}','${loc.id}',${n})">★</span>`).join("");
      return `
        <div class="loc-card" data-loc="${loc.id}">
          <div class="loc-top">
            <span class="loc-drag" title="Drag to reorder">⠿</span>
            <div class="loc-emoji" onclick="openEmojiPicker('${day.id}','${loc.id}',this)">${loc.emoji}</div>
            <div class="loc-fields">
              <input class="loc-name" placeholder="Place name…" value="${esc(loc.name)}"
                oninput="updateLoc('${day.id}','${loc.id}','name',this.value)" />
              <input class="loc-addr" placeholder="Address or area…" value="${esc(loc.address)}"
                oninput="updateLoc('${day.id}','${loc.id}','address',this.value)" />
            </div>
            <button class="loc-del" onclick="deleteLocation('${day.id}','${loc.id}')">✕</button>
          </div>
          <div class="star-row">
            <span class="star-lbl">Rate</span>
            <div class="stars">${stars}</div>
          </div>
          <div class="photo-strip">
            ${loc.photos.map(p=>`
              <div class="photo-wrap">
                <img class="photo-thumb" src="${p.src}" alt="${esc(p.name)}" onclick="openLightbox('${p.src}')" />
                <button class="photo-rm" onclick="removePhoto('${day.id}','${loc.id}','${p.id}')">✕</button>
              </div>
            `).join("")}
            <label class="photo-add">
              <span class="cam">📷</span><span>Add photo</span>
              <input type="file" accept="image/*" multiple style="display:none"
                onchange="handlePhoto('${day.id}','${loc.id}',this.files)" />
            </label>
          </div>
          <div class="loc-notes">
            <div class="note-row">
              <span class="note-lbl">Price</span>
              <input class="note-val" placeholder="e.g. $12 / Free…" value="${esc(loc.price)}"
                oninput="updateLoc('${day.id}','${loc.id}','price',this.value)" />
            </div>
            <div class="note-hr"></div>
            <textarea class="note-memo" placeholder="Memo — hours, tips, what to order…"
              oninput="updateLoc('${day.id}','${loc.id}','memo',this.value)">${esc(loc.memo)}</textarea>
          </div>
        </div>`;
    }).join("") + `<button class="add-loc-btn" onclick="addLocation('${day.id}')">＋ Add location</button>` : "";

    return `
      <div class="day-card ${day.open?"open":""}" data-day="${day.id}">
        <div class="day-header" onclick="toggleDay('${day.id}')">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <div class="date-badge">
            <div class="d">${fmt.d}</div>
            <div class="m">${fmt.m}</div>
          </div>
          <div class="day-info">
            <div class="day-title">${esc(day.title)}</div>
            <div class="day-meta">
              ${fmt.year} · ${locCount} place${locCount!==1?"s":""}${photoCount>0?" · "+photoCount+" photo"+(photoCount!==1?"s":""):""}
              ${weatherHtml}
            </div>
          </div>
          <button class="day-del" onclick="event.stopPropagation();deleteDay('${day.id}')">🗑</button>
          <span class="chevron">▶</span>
        </div>
        ${day.open?`<div class="day-body">${locsHtml}</div>`:""}
      </div>`;
  }).join("");

  // Init drag after render
  initDayDrag();
  days.forEach(day => { if (day.open) initLocDrag(day.id); });

  if (currentView==="calendar") renderCalendar();
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──
load();
const now = new Date();
calYear = now.getFullYear(); calMonth = now.getMonth();
render();
</script>
</body>
</html>
