<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f5f0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Field Journal" />
  <title>Field Journal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --bg2: #efecea;
      --surface: #ffffff;
      --surface2: #f3f1ec;
      --surface3: #eae7e0;
      --border: #e0ddd5;
      --border2: #ccc8be;
      --accent: #2d6a4f;
      --accent2: #40916c;
      --accent-light: #d8f3dc;
      --text: #1a1814;
      --text2: #6b6660;
      --text3: #a09b94;
      --red: #c0392b;
      --amber: #e67e22;
      --blue: #2980b9;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --sidebar-w: 240px;
      --header-h: 60px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── Layout shell ── */
    .shell {
      display: flex;
      height: 100dvh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: transform 0.25s ease;
    }

    .sidebar-logo {
      padding: 28px 22px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .logo-sub {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 4px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
    }

    .nav-section-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 10px 12px 6px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      color: var(--text2);
      font-size: 13.5px;
      font-family: 'Geist', sans-serif;
      font-weight: 400;
      transition: background 0.12s, color 0.12s;
    }

    .nav-btn .ni { font-size: 16px; width: 20px; text-align: center; }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }

    .sidebar-footer {
      padding: 14px 10px;
      border-top: 1px solid var(--border);
    }

    .stat-pill {
      background: var(--bg2);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-lbl {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .stat-val {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100dvh;
      overflow: hidden;
    }

    .topbar {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
      position: relative;
    }

    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      color: var(--text3);
      font-size: 13px;
      pointer-events: none;
    }

    .search-input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 30px;
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      color: var(--text);
      outline: none;
      width: 200px;
      transition: border-color 0.15s, width 0.2s;
    }

    .search-input:focus { border-color: var(--accent); width: 240px; }
    .search-input::placeholder { color: var(--text3); }

    .btn-hamburger {
      display: none;
      border: none;
      background: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text);
      padding: 4px;
    }

    .btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-new:hover { background: var(--accent2); }

    /* ── Pages ── */
    .page {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    .page.active { display: block; }

    /* ── Journal page ── */
    .journal-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 24px 40px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-chip {
      border: 1px solid var(--border2);
      background: var(--surface);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-family: 'Geist Mono', monospace;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.12s;
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Empty ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
      gap: 10px;
      color: var(--text3);
      text-align: center;
    }

    .empty .icon { font-size: 56px; opacity: 0.4; }

    .empty h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--text2);
      margin-top: 6px;
    }

    .empty p { font-size: 13px; line-height: 1.7; max-width: 260px; }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: 10px; }

    /* ── Day Card ── */
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .day-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .day-card.open { border-color: var(--border2); }

    .day-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.12s;
    }

    .day-header:hover { background: var(--bg); }

    .date-badge {
      background: var(--accent);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
      min-width: 50px;
      flex-shrink: 0;
    }

    .date-badge .d {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      line-height: 1;
    }

    .date-badge .m {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    .day-info { flex: 1; min-width: 0; }

    .day-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .day-meta {
      font-size: 11px;
      color: var(--text3);
      font-family: 'Geist Mono', monospace;
      margin-top: 4px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .day-actions { display: flex; gap: 4px; align-items: center; }

    .day-del, .day-edit-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.12s, background 0.12s;
      line-height: 1;
    }

    .day-del:hover { color: var(--red); background: #fdecea; }
    .day-edit-btn:hover { color: var(--accent); background: var(--accent-light); }

    .chevron {
      color: var(--text3);
      font-size: 10px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .day-card.open .chevron { transform: rotate(90deg); }

    /* ── Day Body ── */
    .day-body {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Location card ── */
    .loc-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .loc-card:focus-within { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }

    .loc-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 12px 10px;
    }

    .loc-emoji {
      width: 38px;
      height: 38px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .loc-emoji:active { transform: scale(0.9); }

    .loc-fields { flex: 1; min-width: 0; }

    .loc-name {
      display: block;
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      font-family: 'Geist', sans-serif;
    }

    .loc-name::placeholder { color: var(--text3); font-weight: 400; }

    .loc-addr {
      display: block;
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-size: 11.5px;
      color: var(--text3);
      font-family: 'Geist Mono', monospace;
      margin-top: 3px;
    }

    .loc-addr::placeholder { color: var(--text3); opacity: 0.6; }

    .loc-del {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
    }

    .loc-del:hover { color: var(--red); }

    /* ── Photo strip ── */
    .photo-strip {
      display: flex;
      gap: 8px;
      padding: 0 12px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .photo-strip::-webkit-scrollbar { display: none; }

    .photo-wrap { position: relative; flex-shrink: 0; }

    .photo-thumb {
      width: 84px;
      height: 84px;
      border-radius: 9px;
      object-fit: cover;
      border: 1px solid var(--border);
      display: block;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .photo-thumb:hover { opacity: 0.85; }

    .photo-rm {
      position: absolute;
      top: 4px; right: 4px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-add {
      width: 84px; height: 84px;
      border-radius: 9px;
      border: 1.5px dashed var(--border2);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text3);
      font-size: 11px;
      font-family: 'Geist', sans-serif;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }

    .photo-add:hover { border-color: var(--accent); color: var(--accent); }
    .photo-add span.cam { font-size: 22px; }

    /* ── Loc notes ── */
    .loc-notes {
      margin: 0 12px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 12px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
    }

    .note-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .note-lbl {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      min-width: 36px;
    }

    .note-val {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text);
      font-family: 'Geist', sans-serif;
      min-width: 0;
    }

    .note-val::placeholder { color: var(--text3); }

    .note-hr { height: 1px; background: var(--border); margin: 8px 0; }

    .rating-row { display: flex; align-items: center; gap: 8px; }

    .star-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      transition: transform 0.1s;
      color: var(--border2);
    }

    .star-btn.lit { color: #f39c12; }
    .star-btn:hover { transform: scale(1.2); }

    .note-memo {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-size: 12.5px;
      color: var(--text2);
      font-family: 'Geist', sans-serif;
      resize: none;
      min-height: 56px;
      line-height: 1.7;
    }

    .note-memo::placeholder { color: var(--text3); }

    /* ── Add location ── */
    .add-loc-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px;
      background: none;
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      color: var(--text3);
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: all 0.12s;
    }

    .add-loc-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* ── Map page ── */
    .map-page-wrap { display: flex; flex-direction: column; height: 100%; }

    #map-container {
      flex: 1;
      min-height: 0;
    }

    .map-legend {
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      font-size: 12px;
      color: var(--text2);
      font-family: 'Geist Mono', monospace;
      flex-shrink: 0;
    }

    .map-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Expense page ── */
    .expense-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 24px 40px;
    }

    .expense-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .exp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }

    .exp-card-lbl {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .exp-card-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .exp-card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    .exp-card.highlight { background: var(--accent); border-color: var(--accent); }
    .exp-card.highlight .exp-card-lbl,
    .exp-card.highlight .exp-card-sub { color: rgba(255,255,255,0.7); }
    .exp-card.highlight .exp-card-val { color: #fff; }

    .exp-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .exp-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .exp-table-head {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 80px;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .exp-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 80px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.1s;
    }

    .exp-row:last-child { border-bottom: none; }
    .exp-row:hover { background: var(--bg); }

    .exp-row-name { font-size: 13.5px; font-weight: 500; }
    .exp-row-day { font-size: 12px; color: var(--text3); font-family: 'Geist Mono', monospace; }
    .exp-row-price { font-size: 13.5px; font-weight: 600; color: var(--accent); }
    .exp-row-badge {
      font-size: 11px;
      font-family: 'Geist Mono', monospace;
      color: var(--text3);
      background: var(--bg2);
      padding: 3px 8px;
      border-radius: 6px;
      justify-self: start;
    }

    .exp-bar-section { margin-bottom: 24px; }

    .exp-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .exp-bar-label { font-size: 12.5px; min-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .exp-bar-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .exp-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .exp-bar-amt {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      min-width: 54px;
      text-align: right;
    }

    .exp-currency-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .currency-label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .currency-select {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: 'Geist Mono', monospace;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: slideUp 0.18s ease-out;
    }

    .modal h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Geist', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }

    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 22px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 9px 18px;
      color: var(--text2);
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn-cancel:hover { background: var(--bg2); }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: background 0.12s;
    }

    .btn-add:hover { background: var(--accent2); }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s;
    }

    .lightbox img {
      max-width: 94vw;
      max-height: 88vh;
      border-radius: 10px;
      object-fit: contain;
    }

    .lb-close {
      position: absolute;
      top: 18px; right: 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 38px; height: 38px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }

    .lb-close:hover { background: rgba(255,255,255,0.2); }

    /* ── Emoji picker ── */
    .emoji-pick {
      position: fixed; z-index: 350;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      width: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      animation: fadeIn 0.1s;
    }

    .emoji-opt {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: none;
      background: none;
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }

    .emoji-opt:hover { background: var(--bg2); }

    /* ── Toaster ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      z-index: 500;
      transition: transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        z-index: 200;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }

      .sidebar.open { transform: translateX(0); }
      .btn-hamburger { display: flex; }
      .search-input { width: 160px; }
      .search-input:focus { width: 180px; }
      .notes-grid { grid-template-columns: 1fr; }

      .sidebar-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 190;
        display: none;
      }

      .sidebar-overlay.show { display: block; }
    }

    @media (max-width: 420px) {
      .expense-summary { grid-template-columns: 1fr 1fr; }
      .exp-table-head, .exp-row { grid-template-columns: 1fr auto; }
      .exp-row-day, .exp-row-badge { display: none; }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>

<div class="shell">

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">Field Journal</div>
      <div class="logo-sub">Travel Log</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Views</div>
      <button class="nav-btn active" id="nav-journal" onclick="showPage('journal')">
        <span class="ni">📖</span> Journal
      </button>
      <button class="nav-btn" id="nav-map" onclick="showPage('map')">
        <span class="ni">🗺️</span> Map View
      </button>
      <button class="nav-btn" id="nav-expense" onclick="showPage('expense')">
        <span class="ni">💰</span> Expenses
      </button>

      <div class="nav-section-label" style="margin-top:8px">Tools</div>
      <button class="nav-btn" onclick="exportData()">
        <span class="ni">📤</span> Export JSON
      </button>
      <button class="nav-btn" onclick="importClick()">
        <span class="ni">📥</span> Import JSON
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)" />
    </nav>

    <div class="sidebar-footer">
      <div class="stat-pill">
        <div class="stat-row">
          <span class="stat-lbl">Days</span>
          <span class="stat-val" id="stat-days">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-lbl">Places</span>
          <span class="stat-val" id="stat-places">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-lbl">Photos</span>
          <span class="stat-val" id="stat-photos">0</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="btn-hamburger" onclick="toggleSidebar()">☰</button>
      <h1 class="topbar-title" id="topbar-title">Journal</h1>
      <div class="search-wrap" id="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" placeholder="Search places…" oninput="onSearch(this.value)" />
      </div>
      <button class="btn-new" id="btn-new" onclick="openModal()">
        <span>＋</span> New Day
      </button>
    </header>

    <!-- Journal Page -->
    <div class="page active" id="page-journal">
      <div class="journal-wrap">
        <div class="filter-bar" id="filter-bar"></div>
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <!-- Map Page -->
    <div class="page" id="page-map">
      <div class="map-page-wrap">
        <div id="map-container"></div>
        <div class="map-legend">
          <span><span class="map-legend-dot" style="background:#2d6a4f"></span> Locations with coordinates</span>
          <span style="color:var(--text3)">Click a pin to view details</span>
        </div>
      </div>
    </div>

    <!-- Expense Page -->
    <div class="page" id="page-expense">
      <div class="expense-wrap" id="expense-content"></div>
    </div>

  </div>
</div>

<!-- Modal: New Day -->
<div class="overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h2>New Day Entry</h2>
    <div class="field">
      <label>Date</label>
      <input type="date" id="inp-date" />
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="inp-title" placeholder="e.g. Tokyo Day 1, Arrival…" onkeydown="if(event.key==='Enter')addDay()" />
    </div>
    <div class="field">
      <label>Country / Region</label>
      <input type="text" id="inp-country" placeholder="e.g. Japan, Bangkok…" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModalDirect()">Cancel</button>
      <button class="btn-add" onclick="addDay()">Add Day</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="Photo" onclick="event.stopPropagation()" />
  <button class="lb-close" onclick="closeLightbox()">✕</button>
</div>

<!-- Emoji picker -->
<div class="emoji-pick" id="emoji-pick" style="display:none"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const EMOJIS = ["📍","🏛️","🍜","🍣","☕","🛍️","🌿","🎭","🏖️","🏔️","🚉","🏨","🎪","🌃","🍕","🏞️","🎡","🚢","✈️","🏟️","🎸","🏺","🧁","🍦","🌺","🏯","🌊","🎑","🦜","🌸"];
const STORAGE_KEY = "fj_v3";

let days = [];
let emojiTarget = null;
let leafletMap = null;
let currentPage = "journal";
let searchQ = "";
let currency = "THB";

const CURRENCIES = {
  THB: "฿", USD: "$", EUR: "€", GBP: "£", JPY: "¥", SGD: "S$", KRW: "₩"
};

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ days, currency })); } catch(e) {}
}

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) {
      const parsed = JSON.parse(d);
      if (Array.isArray(parsed)) { days = parsed; }
      else { days = parsed.days || []; currency = parsed.currency || "THB"; }
    }
  } catch(e) { days = []; }
}

function genId() { return Math.random().toString(36).slice(2,9); }
function today() { return new Date().toISOString().slice(0,10); }

function fmtDate(str) {
  if (!str) return { d:"--", m:"---", year:"", full:"" };
  const [y,mo,dy] = str.split("-").map(Number);
  const dt = new Date(y, mo-1, dy);
  return {
    d: String(dy).padStart(2,"0"),
    m: dt.toLocaleString("en",{month:"short"}).toUpperCase(),
    year: y,
    full: dt.toLocaleString("en",{weekday:"long",month:"long",day:"numeric",year:"numeric"})
  };
}

function parsePrice(str) {
  if (!str) return 0;
  const n = parseFloat(String(str).replace(/[^0-9.]/g,""));
  return isNaN(n) ? 0 : n;
}

function sym() { return CURRENCIES[currency] || currency; }

/* ═══════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════ */
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ═══════════════════════════════════════
   SIDEBAR / NAV
═══════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebar-overlay").classList.toggle("show");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("show");
}

function showPage(name) {
  currentPage = name;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  const nb = document.getElementById("nav-" + name);
  if (nb) nb.classList.add("active");

  const titles = { journal:"Journal", map:"Map View", expense:"Expenses" };
  document.getElementById("topbar-title").textContent = titles[name] || name;

  const btnNew = document.getElementById("btn-new");
  const searchWrap = document.getElementById("search-wrap");
  btnNew.style.display = name === "journal" ? "" : "none";
  searchWrap.style.display = name === "journal" ? "" : "none";

  closeSidebar();

  if (name === "map") renderMap();
  if (name === "expense") renderExpense();
}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
function openModal() {
  document.getElementById("inp-date").value = today();
  document.getElementById("inp-title").value = "";
  document.getElementById("inp-country").value = "";
  document.getElementById("modal").style.display = "flex";
  setTimeout(() => document.getElementById("inp-title").focus(), 100);
}

function closeModal(e) { if (e.target === document.getElementById("modal")) closeModalDirect(); }
function closeModalDirect() { document.getElementById("modal").style.display = "none"; }

function addDay() {
  const date = document.getElementById("inp-date").value;
  if (!date) return;
  const title = document.getElementById("inp-title").value.trim() || "Untitled Day";
  const country = document.getElementById("inp-country").value.trim();
  const id = genId();
  days.push({ id, date, title, country, open: true, locations: [] });
  days.sort((a,b) => a.date.localeCompare(b.date));
  save(); render(); closeModalDirect();
  toast("Day added ✓");
}

/* ═══════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════ */
function openLightbox(src) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() { document.getElementById("lightbox").style.display = "none"; }

/* ═══════════════════════════════════════
   EMOJI PICKER
═══════════════════════════════════════ */
function openEmojiPicker(dayId, locId, btn) {
  emojiTarget = { dayId, locId };
  const pick = document.getElementById("emoji-pick");
  pick.innerHTML = EMOJIS.map(e =>
    `<button class="emoji-opt" onclick="selectEmoji('${e}')">${e}</button>`
  ).join("");
  const r = btn.getBoundingClientRect();
  pick.style.top = Math.min(r.bottom + 6, window.innerHeight - 260) + "px";
  pick.style.left = Math.min(r.left, window.innerWidth - 228) + "px";
  pick.style.display = "flex";
}

function selectEmoji(e) {
  if (!emojiTarget) return;
  updateLoc(emojiTarget.dayId, emojiTarget.locId, "emoji", e);
  render();
  document.getElementById("emoji-pick").style.display = "none";
  emojiTarget = null;
}

document.addEventListener("click", e => {
  const pick = document.getElementById("emoji-pick");
  if (pick && !pick.contains(e.target) && !e.target.classList.contains("loc-emoji"))
    pick.style.display = "none";
});

/* ═══════════════════════════════════════
   DATA HELPERS
═══════════════════════════════════════ */
function getDay(id) { return days.find(d => d.id === id); }
function getLoc(dayId, locId) { return getDay(dayId)?.locations.find(l => l.id === locId); }

function toggleDay(id) {
  const d = getDay(id);
  if (d) { d.open = !d.open; save(); render(); }
}

function deleteDay(id) {
  if (!confirm("Delete this day and all its data?")) return;
  days = days.filter(d => d.id !== id);
  save(); render(); toast("Day deleted");
}

function addLocation(dayId) {
  const d = getDay(dayId);
  if (!d) return;
  d.locations.push({
    id: genId(),
    name: "", address: "", emoji: EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    photos: [], price: "", memo: "", rating: 0, lat: "", lng: ""
  });
  save(); render();
  setTimeout(() => {
    const inputs = document.querySelectorAll(`[data-day="${dayId}"] .loc-name`);
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function deleteLocation(dayId, locId) {
  const d = getDay(dayId);
  if (!d) return;
  d.locations = d.locations.filter(l => l.id !== locId);
  save(); render();
}

function updateLoc(dayId, locId, field, val) {
  const l = getLoc(dayId, locId);
  if (l) { l[field] = val; save(); }
}

function setRating(dayId, locId, val) {
  updateLoc(dayId, locId, "rating", val);
  render();
}

function handlePhoto(dayId, locId, files) {
  Array.from(files).forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      const l = getLoc(dayId, locId);
      if (l) { l.photos.push({ id: genId(), src: e.target.result, name: file.name }); save(); render(); }
    };
    r.readAsDataURL(file);
  });
}

function removePhoto(dayId, locId, photoId) {
  const l = getLoc(dayId, locId);
  if (l) { l.photos = l.photos.filter(p => p.id !== photoId); save(); render(); }
}

/* ═══════════════════════════════════════
   SEARCH & FILTER
═══════════════════════════════════════ */
function onSearch(q) {
  searchQ = q.toLowerCase();
  render();
}

function filteredDays() {
  if (!searchQ) return days;
  return days.filter(d =>
    d.title.toLowerCase().includes(searchQ) ||
    (d.country||"").toLowerCase().includes(searchQ) ||
    d.locations.some(l => l.name.toLowerCase().includes(searchQ) || l.address.toLowerCase().includes(searchQ))
  );
}

/* ═══════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════ */
function exportData() {
  const data = JSON.stringify({ days, currency }, null, 2);
  const a = document.createElement("a");
  a.href = "data:application/json," + encodeURIComponent(data);
  a.download = "field-journal-" + today() + ".json";
  a.click();
  toast("Exported ✓");
}

function importClick() { document.getElementById("import-file").click(); }

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (parsed.days) { days = parsed.days; currency = parsed.currency || "THB"; }
      else if (Array.isArray(parsed)) { days = parsed; }
      save(); render(); toast("Imported ✓");
    } catch { toast("Invalid JSON file"); }
  };
  r.readAsText(file);
  input.value = "";
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
function updateStats() {
  document.getElementById("stat-days").textContent = days.length;
  document.getElementById("stat-places").textContent = days.reduce((s,d) => s+d.locations.length, 0);
  document.getElementById("stat-photos").textContent = days.reduce((s,d) => s+d.locations.reduce((ss,l) => ss+l.photos.length, 0), 0);
}

/* ═══════════════════════════════════════
   MAP
═══════════════════════════════════════ */
function renderMap() {
  const container = document.getElementById("map-container");

  if (!leafletMap) {
    leafletMap = L.map("map-container").setView([13.75, 100.5], 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
      maxZoom: 19
    }).addTo(leafletMap);
  } else {
    leafletMap.eachLayer(layer => { if (layer instanceof L.Marker) leafletMap.removeLayer(layer); });
  }

  const bounds = [];
  let pinCount = 0;

  days.forEach(day => {
    const fmt = fmtDate(day.date);
    day.locations.forEach(loc => {
      const lat = parseFloat(loc.lat);
      const lng = parseFloat(loc.lng);
      if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
        const icon = L.divIcon({
          html: `<div style="background:#2d6a4f;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.2)">${loc.emoji||"📍"}</div>`,
          className: "",
          iconSize: [32,32],
          iconAnchor: [16,32]
        });
        const marker = L.marker([lat, lng], { icon }).addTo(leafletMap);
        marker.bindPopup(`
          <div style="font-family:Geist,sans-serif;min-width:160px">
            <div style="font-weight:600;font-size:14px;margin-bottom:4px">${esc(loc.name||"Unnamed")}</div>
            <div style="font-size:11px;color:#888;margin-bottom:6px">${esc(loc.address||"")}</div>
            <div style="font-size:11px;color:#555">${fmt.d} ${fmt.m} ${fmt.year}</div>
            ${loc.price ? `<div style="font-size:12px;font-weight:600;color:#2d6a4f;margin-top:4px">${sym()} ${esc(loc.price)}</div>` : ""}
            ${loc.rating ? `<div style="margin-top:4px">${"⭐".repeat(loc.rating)}</div>` : ""}
          </div>
        `);
        bounds.push([lat, lng]);
        pinCount++;
      }
    });
  });

  if (bounds.length > 0) {
    leafletMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }

  setTimeout(() => leafletMap.invalidateSize(), 100);
}

/* ═══════════════════════════════════════
   EXPENSE
═══════════════════════════════════════ */
function renderExpense() {
  const wrap = document.getElementById("expense-content");
  const allLocs = days.flatMap(d => d.locations.map(l => ({ ...l, dayTitle: d.title, dayDate: d.date })));
  const priced = allLocs.filter(l => parsePrice(l.price) > 0);

  const total = priced.reduce((s,l) => s + parsePrice(l.price), 0);
  const avg = days.length > 0 ? total / days.length : 0;
  const maxLoc = priced.reduce((mx,l) => parsePrice(l.price) > parsePrice(mx?.price||0) ? l : mx, null);

  // Per day totals
  const dayTotals = days.map(d => ({
    title: d.title,
    date: d.date,
    total: d.locations.reduce((s,l) => s+parsePrice(l.price), 0)
  })).filter(d => d.total > 0).sort((a,b) => b.total - a.total);

  const maxDayTotal = Math.max(...dayTotals.map(d => d.total), 1);

  wrap.innerHTML = `
    <div class="exp-currency-row">
      <span class="currency-label">Currency</span>
      <select class="currency-select" onchange="currency=this.value;save();renderExpense()">
        ${Object.keys(CURRENCIES).map(c => `<option value="${c}" ${c===currency?"selected":""}>${c} ${CURRENCIES[c]}</option>`).join("")}
      </select>
    </div>

    <div class="expense-summary">
      <div class="exp-card highlight">
        <div class="exp-card-lbl">Total Spent</div>
        <div class="exp-card-val">${sym()}${total.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        <div class="exp-card-sub">${priced.length} place${priced.length!==1?"s":""} tracked</div>
      </div>
      <div class="exp-card">
        <div class="exp-card-lbl">Daily Average</div>
        <div class="exp-card-val">${sym()}${avg.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        <div class="exp-card-sub">over ${days.length} day${days.length!==1?"s":""}</div>
      </div>
      <div class="exp-card">
        <div class="exp-card-lbl">Most Expensive</div>
        <div class="exp-card-val" style="font-size:20px">${maxLoc ? (sym()+parsePrice(maxLoc.price).toLocaleString(undefined,{maximumFractionDigits:0})) : "—"}</div>
        <div class="exp-card-sub">${maxLoc ? esc(maxLoc.name||"Unnamed") : "No data yet"}</div>
      </div>
      <div class="exp-card">
        <div class="exp-card-lbl">Places Logged</div>
        <div class="exp-card-val">${allLocs.length}</div>
        <div class="exp-card-sub">${days.length} day${days.length!==1?"s":""} total</div>
      </div>
    </div>

    ${dayTotals.length > 0 ? `
    <div class="exp-bar-section">
      <h2 class="exp-section-title">Spending by Day</h2>
      ${dayTotals.map(d => `
        <div class="exp-bar-row">
          <span class="exp-bar-label">${esc(d.title)}</span>
          <div class="exp-bar-track">
            <div class="exp-bar-fill" style="width:${(d.total/maxDayTotal*100).toFixed(1)}%"></div>
          </div>
          <span class="exp-bar-amt">${sym()}${d.total.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
        </div>
      `).join("")}
    </div>
    ` : ""}

    ${priced.length > 0 ? `
    <h2 class="exp-section-title">All Expenses</h2>
    <div class="exp-table">
      <div class="exp-table-head">
        <span>Place</span>
        <span>Day</span>
        <span>Amount</span>
        <span>Rating</span>
      </div>
      ${priced.sort((a,b) => parsePrice(b.price)-parsePrice(a.price)).map(l => `
        <div class="exp-row">
          <div>
            <div class="exp-row-name">${l.emoji||"📍"} ${esc(l.name||"Unnamed")}</div>
            <div class="exp-row-day">${esc(l.dayTitle)}</div>
          </div>
          <div class="exp-row-day">${fmtDate(l.dayDate).d} ${fmtDate(l.dayDate).m}</div>
          <div class="exp-row-price">${sym()}${parsePrice(l.price).toLocaleString(undefined,{maximumFractionDigits:0})}</div>
          <div class="exp-row-badge">${l.rating ? "⭐".repeat(l.rating) : "—"}</div>
        </div>
      `).join("")}
    </div>
    ` : `
    <div class="empty">
      <div class="icon">💸</div>
      <h2>No expenses yet</h2>
      <p>Add price info to your locations in the Journal to track spending here.</p>
    </div>
    `}
  `;
}

/* ═══════════════════════════════════════
   JOURNAL RENDER
═══════════════════════════════════════ */
function render() {
  updateStats();
  const tl = document.getElementById("timeline");
  const fd = filteredDays();

  if (days.length === 0) {
    tl.innerHTML = `
      <div class="empty">
        <div class="icon">🗺️</div>
        <h2>Your journal is empty</h2>
        <p>Start by adding your first travel day — then log places, photos, and expenses.</p>
      </div>`;
    document.getElementById("filter-bar").innerHTML = "";
    return;
  }

  // Filter chips: unique countries
  const countries = [...new Set(days.filter(d=>d.country).map(d=>d.country))];
  document.getElementById("filter-bar").innerHTML = countries.length > 1 ? [
    `<button class="filter-chip ${!searchQ?'active':''}" onclick="onSearch('')">All</button>`,
    ...countries.map(c => `<button class="filter-chip ${searchQ===c.toLowerCase()?'active':''}" onclick="onSearch('${c.toLowerCase()}')">${c}</button>`)
  ].join("") : "";

  if (fd.length === 0) {
    tl.innerHTML = `<div class="empty"><div class="icon">🔍</div><h2>No results</h2><p>Try a different search term.</p></div>`;
    return;
  }

  tl.innerHTML = fd.map(day => {
    const fmt = fmtDate(day.date);
    const locCount = day.locations.length;
    const photoCount = day.locations.reduce((s,l) => s+l.photos.length, 0);
    const totalSpend = day.locations.reduce((s,l) => s+parsePrice(l.price), 0);

    const locsHtml = day.open ? day.locations.map(loc => {
      const stars = [1,2,3,4,5].map(i =>
        `<button class="star-btn ${loc.rating>=i?'lit':''}" onclick="setRating('${day.id}','${loc.id}',${i})" title="${i} star">★</button>`
      ).join("");

      return `
        <div class="loc-card">
          <div class="loc-top">
            <div class="loc-emoji" onclick="openEmojiPicker('${day.id}','${loc.id}',this)">${loc.emoji}</div>
            <div class="loc-fields">
              <input class="loc-name" placeholder="Place name…" value="${esc(loc.name)}"
                oninput="updateLoc('${day.id}','${loc.id}','name',this.value)" />
              <input class="loc-addr" placeholder="Address or area…" value="${esc(loc.address)}"
                oninput="updateLoc('${day.id}','${loc.id}','address',this.value)" />
            </div>
            <button class="loc-del" onclick="deleteLocation('${day.id}','${loc.id}')">✕</button>
          </div>

          <div class="photo-strip">
            ${loc.photos.map(p => `
              <div class="photo-wrap">
                <img class="photo-thumb" src="${p.src}" alt="${esc(p.name)}" onclick="openLightbox('${p.src}')" />
                <button class="photo-rm" onclick="removePhoto('${day.id}','${loc.id}','${p.id}')">✕</button>
              </div>
            `).join("")}
            <label class="photo-add">
              <span class="cam">📷</span>
              <span>Photo</span>
              <input type="file" accept="image/*" multiple style="display:none"
                onchange="handlePhoto('${day.id}','${loc.id}',this.files)" />
            </label>
          </div>

          <div class="loc-notes">
            <div class="notes-grid">
              <div class="note-row">
                <span class="note-lbl">Price</span>
                <input class="note-val" placeholder="e.g. 150…" value="${esc(loc.price)}"
                  oninput="updateLoc('${day.id}','${loc.id}','price',this.value)" />
              </div>
              <div class="note-row">
                <span class="note-lbl">Lat</span>
                <input class="note-val" placeholder="13.7563" value="${esc(loc.lat||'')}"
                  oninput="updateLoc('${day.id}','${loc.id}','lat',this.value)" />
              </div>
              <div class="rating-row">
                <span class="note-lbl">Rate</span>
                ${stars}
              </div>
              <div class="note-row">
                <span class="note-lbl">Lng</span>
                <input class="note-val" placeholder="100.5018" value="${esc(loc.lng||'')}"
                  oninput="updateLoc('${day.id}','${loc.id}','lng',this.value)" />
              </div>
            </div>
            <div class="note-hr"></div>
            <textarea class="note-memo" placeholder="Memo — hours, tips, what to order, what to skip…"
              oninput="updateLoc('${day.id}','${loc.id}','memo',this.value)">${esc(loc.memo)}</textarea>
          </div>
        </div>
      `;
    }).join("") + `
      <button class="add-loc-btn" onclick="addLocation('${day.id}')">＋ Add location</button>
    ` : "";

    return `
      <div class="day-card ${day.open?"open":""}" data-day="${day.id}">
        <div class="day-header" onclick="toggleDay('${day.id}')">
          <div class="date-badge">
            <div class="d">${fmt.d}</div>
            <div class="m">${fmt.m}</div>
          </div>
          <div class="day-info">
            <div class="day-title">${esc(day.title)}</div>
            <div class="day-meta">
              <span class="day-meta-chip">📅 ${fmt.year}</span>
              ${day.country ? `<span class="day-meta-chip">📍 ${esc(day.country)}</span>` : ""}
              <span class="day-meta-chip">🏙 ${locCount} place${locCount!==1?"s":""}</span>
              ${photoCount>0 ? `<span class="day-meta-chip">🖼 ${photoCount}</span>` : ""}
              ${totalSpend>0 ? `<span class="day-meta-chip">💰 ${sym()}${totalSpend.toLocaleString(undefined,{maximumFractionDigits:0})}</span>` : ""}
            </div>
          </div>
          <div class="day-actions">
            <button class="day-del" onclick="event.stopPropagation();deleteDay('${day.id}')" title="Delete day">🗑</button>
          </div>
          <span class="chevron">▶</span>
        </div>
        ${day.open ? `<div class="day-body">${locsHtml}</div>` : ""}
      </div>
    `;
  }).join("");
}

/* ═══════════════════════════════════════
   SERVICE WORKER
═══════════════════════════════════════ */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
load();
render();
</script>
</body>
</html>
